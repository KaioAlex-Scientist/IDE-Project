<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>IDE - GRUPO 3 uWu</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="tema-roxo">

<!-- ================= HEADER ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">
  <img src="img/ide.png" alt="Logo" class="logo">
</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">

  <ul class="navbar-nav mx-auto">
    <li class="nav-item"><a class="nav-link" href="#promo">HOME</a></li>
    <li class="nav-item"><a class="nav-link" href="#carousel">OFERTAS</a></li>
    <li class="nav-item"><a class="nav-link" href="#jogos">DESTAQUES</a></li>
  </ul>

  <div class="d-flex align-items-center">
    <img src="img/login.png" class="nav-img me-3">  
    <img src="img/tema.png" class="nav-img" onclick="trocarTema()">
  </div>

    </div>
  </div>
</nav>

<div style="margin-top:80px;"></div>

<!-- ================= PROMO ================= -->
<section id="promo" class="text-center">
  <img id="promo-img" class="w-100">
</section>



<!-- Edu: Eae povo que ta lendo o codigo, eu fiz essa parte do Carousel junto com o card que fica do ladinho OwO -->
<!-- ================= CAROUSEL ================= -->
<section class="container mt-6">
  <div class="row align-items-center">

    <!-- CAROUSEL -->
    <div class="col-8 col-lg-9">
      <div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

        <div class="carousel-inner" id="carousel-inner"></div>

        <div class="carousel-indicators" id="carousel-indicators"></div>

        <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>

      </div>
    </div>

    <!-- ================= CARD  ================= -->
    <div class="col-4 col-lg-2"> 
      <div class="info-jogo p-3">

        
        <span id="desconto" class="desconto-badge"></span>
        <div id="categorias" class="mb-2"></div>
        
        <h3 id="preco-final" class="preco-final mb-1"></h3>
        <p id="preco-original" class="preco-original mt-0"></p>


      </div>
    </div>

  </div>
</section>




<!-- ================= LISTA DE JOGOS ================= -->
<section id="jogos" class="container mt-5">
  <div class="row" id="lista-jogos">

    <div class="col-md-4">
      <div class="card jogo-card">
        <img src="img/jogo1.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Jogo A</h5>
          <p>R$ 29,90</p>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- ================= FORM ================= -->
<section id="form" class="container mt-5">
  <h3>Contato</h3>
  <form>
    <input class="form-control mb-2" placeholder="Nome">
    <input class="form-control mb-2" placeholder="Email">
    <input class="form-control mb-2" placeholder="Jogo">
    <textarea class="form-control mb-2" placeholder="Deixe a sua avaliação UwU"></textarea>
    <button class="btn btn-success">Enviar</button>
  </form>
</section>

<!-- ================= BADGES ================= -->
<section class="container mt-5 text-center">
  <button class="btn btn-secondary" onclick="popup('Termos')">Termos</button>
  <button class="btn btn-secondary" onclick="popup('Privacidade')">Privacidade</button>
  <button class="btn btn-secondary" onclick="popup('Cookies')">Cookies</button>
</section>

<!-- ================= NEKO ================= -->
<section class="text-center mt-5">
  <img src="img/neko.png" class="neko">
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/carousel.js"></script>
<script src="js/script.js"></script>

</body>
</html>
